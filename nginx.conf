server {
    listen 80;
    server_name imersao.foxpreparatorios.com.br;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 1. SEO Injection Route: /imersao
    # This MUST be proxied to the Node.js server (port 3000) so it can inject the meta tags.
    location ~* ^/imersao/?$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. API Routes
    # Proxy /api requests to the backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Static Files (Optional optimization)
    # You can let Nginx serve static files directly if the path is correct.
    # Otherwise, you can proxy everything to port 3000.
    # Here we try to serve files, and if not found, fallback to the Node app (which handles SPA routing).
    root /www/wwwroot/imersao.foxpreparatorios.com.br/dist; # Verify this path on your server
    index index.html;

    location / {
        try_files $uri $uri/ @node_server;
    }

    # 4. Fallback to Node.js Server
    # Handles all other routes (SPA) and ensures the app logic runs if needed.
    location @node_server {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri @node_server;
    }
}
